# Phase 1: a single DeBERTa-MNLI model serves both paths.
# We read entailment_prob for support and contradiction_prob for contradict.
# Local path to bypass IPv6 flakiness on WSL2 for HF Hub auto-download.
support:
  model: ./models/deberta-v3-base-mnli
  batch_size: 16
  max_len: 512

contradict:
  model: ./models/deberta-v3-base-mnli
  batch_size: 16
  max_len: 512
  audit_sample: 50  # NegEx-drop audit per task 8.6
